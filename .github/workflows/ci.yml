name: CI  # 闭环④:测试/验证驱动上游 → build → ACR → ECS(docker)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: registry.cn-hangzhou.aliyuncs.com/freeboot/assetsmanagement

jobs:
  # ── 传感器:每 commit 跑,任一红即挡回对应上游闭环 ──
  sensors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Setup deps
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: 架构契约(闭环②)
        run: export PATH="$HOME/.local/bin:$PATH"; .venv/bin/lint-imports
      - name: 单元/集成测试(闭环③)
        run: .venv/bin/pytest -q
      - name: 验收测试 behave(闭环①)
        run: .venv/bin/behave specs/features

  # ── 构建 + 推 ACR + 部署到 ECS(docker)──
  deploy:
    needs: sensors
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ECS 是 ARM64(Alibaba Cloud Linux ARM),必须构建 linux/arm64 镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image (linux/arm64)
        run: |
          docker buildx build --platform linux/arm64 \
            -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" \
            --push .

      - name: Deploy to ECS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.ECS_HOST }}                 # ECS 公网 IP
          username: ${{ secrets.ECS_USER }}             # 如 root
          password: ${{ secrets.ECS_SSH_PASSWORD }}     # ECS 登录密码
          port: 22
          script: |
            set -e
            echo '${{ secrets.ACR_PASSWORD }}' | docker login -u '${{ secrets.ACR_USERNAME }}' --password-stdin registry.cn-hangzhou.aliyuncs.com
            docker pull ${{ env.IMAGE }}:latest
            docker rm -f assets-api 2>/dev/null || true
            ENVOPT=""; [ -f /opt/assets/.env ] && ENVOPT="--env-file /opt/assets/.env"
            docker run -d --name assets-api --restart always -p 80:8000 $ENVOPT ${{ env.IMAGE }}:latest
            docker image prune -f || true
            echo "已部署,容器状态:"; docker ps --filter name=assets-api

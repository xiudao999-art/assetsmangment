name: CI  # 闭环④:测试/验证 → 构建镜像推 ACR(仅推仓库,不自动部署;ECS 由人工热更部署)

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  IMAGE: registry.cn-hangzhou.aliyuncs.com/freeboot/assetsmanagement

jobs:
  # ── 传感器:每 commit 跑,任一红即挡回对应上游闭环 ──
  sensors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        run: curl -LsSf https://astral.sh/uv/install.sh | sh
      - name: Setup deps
        run: |
          export PATH="$HOME/.local/bin:$PATH"
          uv venv --python 3.11
          uv pip install -e ".[dev]"
      - name: 架构契约(闭环②)
        run: export PATH="$HOME/.local/bin:$PATH"; .venv/bin/lint-imports
      - name: 单元/集成测试(闭环③)
        run: .venv/bin/pytest -q
      - name: 验收测试 behave(闭环①)
        run: .venv/bin/behave specs/features

  # ── 构建 + 推镜像到 ACR(仅推仓库;不部署 —— 部署由人工热更到 ECS)──
  build-push:
    needs: sensors
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Login to ACR
        uses: aliyun/acr-login@v1
        with:
          login-server: registry.cn-hangzhou.aliyuncs.com
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      # ECS 是 ARM64(Alibaba Cloud Linux ARM),必须构建 linux/arm64 镜像
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push image (linux/arm64)
        run: |
          docker buildx build --platform linux/arm64 \
            -t "$IMAGE:${{ github.sha }}" -t "$IMAGE:latest" \
            --push .
      # 到此为止:镜像已推到 ACR。部署到 ECS 由人工热更(docker cp + restart)完成,CI 不自动碰生产容器/pgvector 网络。

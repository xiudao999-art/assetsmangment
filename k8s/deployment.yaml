apiVersion: apps/v1
kind: Deployment
metadata:
  name: assets-api
  labels:
    app: assets-api
spec:
  replicas: 3
  selector:
    matchLabels:
      app: assets-api
  template:
    metadata:
      labels:
        app: assets-api
    spec:
      containers:
        - name: api
          image: registry.cn-hangzhou.aliyuncs.com/freeboot/assetsmanagement:latest
          ports:
            - containerPort: 8000
          # 密钥(AM_OSS_* / AM_DASHSCOPE_* / AM_DATABASE_URL 等)从 k8s Secret 注入
          envFrom:
            - secretRef:
                name: assets-secrets
                optional: true
          readinessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 250m, memory: 256Mi }
            limits: { cpu: "1", memory: 512Mi }
